# Minimal values file for webrix-helm chart
# This file contains only the essential settings for a basic installation

# Global configuration
global:
  # Domain configuration
  domain:
    host: "webrix.local"

# Application deployments - enable only the services you need
deployments:
  # Webrix App service
  app:
    ingress:
      subdomain: "onprem-app"
 
  connect:
    ingress:
      subdomain: "onprem-connect"

  run:
    ingress:
      subdomain: "onprem-run"
      

# PostgreSQL configuration (only used if db_provider is "postgresql")
postgresql:
  enabled: true
  auth:
    enablePostgresUser: true
    postgresPassword: "webrix123"
    database: "webrix"
  primary:
    persistence:
      enabled: true
      size: 1Gi

ingress:
  enabled: true
  className: "nginx"
  tls:
    enabled: false
    secretName: "webrix-tls"
