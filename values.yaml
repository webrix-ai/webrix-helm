# Global configuration
global:
  # Database provider: "postgresql" for in-cluster db, or "external" for external db
  db_provider: "postgresql" # postgresql | external
  
  # External database URL (alternative to externalDatabase configuration)
  external_db_url: ""
  
  # Global domain configuration
  domain:
    host: "blahblah.com"
  
  # Common labels applied to all resources
  labels: {}
  
  # Common annotations applied to all resources
  annotations: {}

# Application deployments configuration
deployments:
  # MCP-S App service
  app:
    enabled: true
    replicas: 1
    image:
      repository: "quay.io/idan-chetrit/mcp-s-app"
      tag: "latest"
      pullPolicy: "IfNotPresent"
    
    service:
      type: ClusterIP
      port: 80
      targetPort: 3000
    
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 1000m
        memory: 2048Mi
    
    nodeSelector: {}
    tolerations: []
    affinity: {}
    
    podAnnotations: {}
    podLabels: {}
    
    serviceAccount:
      create: true
      annotations: {}
      name: ""
    
    env:
      PORT: "3000"
      ORG: "on-prem-org"
      ON_PREM: "true"
      NEXTAUTH_URL: "https://app.mcp-s.com"
      NEXT_PUBLIC_CONNECT_URL: "https://connect.mcp-s.com"
    
    extraEnv:
      DB_BASE_URL: "https://dbservice.mcp-s.com"
    
    ingress:
      enabled: true
      className: "nginx"
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
      subdomain: "app"
      path: "/"
      pathType: "Prefix"
      tls: []

  # MCP-S Connect service
  connect:
    enabled: true
    replicas: 1
    image:
      repository: "quay.io/idan-chetrit/mcp-s-connect"
      tag: "latest"
      pullPolicy: "IfNotPresent"
    
    service:
      type: ClusterIP
      port: 80
      targetPort: 3000
    
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 1000m
        memory: 2048Mi
    
    nodeSelector: {}
    tolerations: []
    affinity: {}
    
    podAnnotations: {}
    podLabels: {}
    
    serviceAccount:
      create: true
      annotations: {}
      name: ""
    
    env:
      PORT: "3000"
      ORG: "on-prem-org"
      ON_PREM: "true"
      DEBUG: "true"
      NEXTAUTH_URL: "https://connect.mcp-s.com"
    
    extraEnv:
      DB_BASE_URL: "https://dbservice.mcp-s.com"
      RUN_URL: "https://run.mcp-s.com"
    
    ingress:
      enabled: true
      className: "nginx"
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
      subdomain: "connect"
      path: "/"
      pathType: "Prefix"
      tls: []

  # MCP-S Run service
  run:
    enabled: true
    replicas: 1
    image:
      repository: "quay.io/idan-chetrit/mcp-s-run"
      tag: "latest"
      pullPolicy: "IfNotPresent"
    
    service:
      type: ClusterIP
      port: 80
      targetPort: 3000
    
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 1000m
        memory: 2048Mi
    
    nodeSelector: {}
    tolerations: []
    affinity: {}
    
    podAnnotations: {}
    podLabels: {}
    
    serviceAccount:
      create: true
      annotations: {}
      name: ""
    
    env:
      PORT: "3000"
      ORG: "on-prem-org"
      LOG_LEVEL: "info"
    
    extraEnv:
      DB_SERVICE_URL: "https://dbservice.mcp-s.com"
      BASE_URL: "https://run.mcp-s.com"
      CONNECT_URL: "https://connect.mcp-s.com"
    
    ingress:
      enabled: true
      className: "nginx"
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
      subdomain: "run"
      path: "/"
      pathType: "Prefix"
      tls: []

  # MCP-S DB Service
  dbService:
    enabled: true
    replicas: 1
    image:
      repository: "quay.io/idan-chetrit/mcp-s-db-service"
      tag: "latest"
      pullPolicy: "IfNotPresent"
    
    # Database configuration for dbService
    db:
      user: "postgres"
      password: "postgres"
      port: 5432
      name: "postgres"
    
    service:
      type: ClusterIP
      port: 80
      targetPort: 3000
    
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 1000m
        memory: 2048Mi
    
    nodeSelector: {}
    tolerations: []
    affinity: {}
    
    podAnnotations: {}
    podLabels: {}
    
    serviceAccount:
      create: true
      annotations: {}
      name: ""
    
    env:
      PORT: "3000"
      ORG: "on-prem-org"
      ON_PREM: "true"
      DEBUG_QUERIES: "true"
      POSTGRES_HOST_AUTH_METHOD: "trust"
      RATE_LIMIT_MAX: "1000"
      RATE_LIMIT_WINDOW: "60000"
    
    extraEnv:
      DATABASE_URL: "postgres://postgres:postgres@webrix-postgresql:5432/postgres?sslmode=disable"
      RUN_URL: "https://run.mcp-s.com"
      CONNECT_URL: "https://connect.mcp-s.com"
    
    ingress:
      enabled: true
      className: "nginx"
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
      subdomain: "dbservice"
      path: "/"
      pathType: "Prefix"
      tls: []

# Shared environment variables
sharedEnv:
  AUTH_SECRET: "aUi2V5iCVqUrbrdjKty1zH4HCqszXArV9BLVU2giqhY="
  DB_AUTH_SECRET: "ZI39UlR2sN6HFZauuze0iNEZnNkF1wiOuGklm3bC8dk="
  AUTO_AUTHENTICATE_TOKEN: "balQgAqCpKW979XoibTYSbfCjvj7uSJK+90m0iQG5"
  ENCRYPTION_KEY: "iL7wUJhqRMPFY0asXqLAn1JjW9kv0OqC4NHtqKHt5VY="

# PostgreSQL configuration
postgresql:
  enabled: true
  fullnameOverride: "webrix-postgresql"
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: "16.7.0"
  auth:
    enablePostgresUser: true
    postgresPassword: "postgres"
  
  primary:
    resourcesPreset: "small"
    persistence:
      enabled: true
      size: 8Gi
      storageClass: ""
  
  readReplicas:
    replicaCount: 0
  
  service:
    type: ClusterIP
    ports:
      postgresql: 5432
  
  metrics:
    enabled: false
  
  architecture: standalone
  
  postgresqlConfiguration:
    listen_addresses: "'*'"
    max_connections: "200"

# External database configuration (when db_provider is "external")
externalDatabase:
  # Option 1: Provide a complete database URL
  url: ""
  
  # Option 2: Provide individual components (used if url is empty)
  host: ""
  port: 5432
  database: "postgres"
  username: "postgres"
  password: ""
  sslMode: "disable"
