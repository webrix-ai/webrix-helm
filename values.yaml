# Global configuration
global:
  # Database provider: "postgresql" for in-cluster db, or "external" for external db
  db_provider: "postgresql" # postgresql | external
  
  # External database URL (alternative to externalDatabase configuration)
  external_db_url: ""
  
  # Global domain configuration
  domain:
    host: "blahblah.com"

  ON_PREM: true
  ORG: "on-prem-org"
  
  # Common labels applied to all resources
  labels: {}
  
  # Common annotations applied to all resources
  annotations: {}

# Application deployments configuration
deployments:
  app:
    enabled: true
    replicas: 1
    image:
      repository: "quay.io/webrix/mcp-s-app"
      tag: "latest"
    
    service:
      port: 80
      targetPort: 3000
    
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 1000m
        memory: 2048Mi
    
    nodeSelector: {}
    tolerations: []
    affinity: {}
    
    podAnnotations: {}
    podLabels: {}
    
    serviceAccount:
      create: true
      annotations: {}
      name: ""
    
    env:
      PORT: "3000"
      DB_AUTH_SECRET: "ZI39UlR2sN6HFZauuze0iNEZnNkF1wiOuGklm3bC8dk="
      AUTH_SECRET: "aUi2V5iCVqUrbrdjKty1zH4HCqszXArV9BLVU2giqhY="

    # Health check probes
    readinessProbe: {}
    livenessProbe: {}


    # Optional: name of an existing secret to mount as environment variables
    # secretName: "my-existing-secret"

    ingress:
      enabled: true
      className: "nginx"
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
      subdomain: "webrix-app"
      path: "/"
      pathType: "Prefix"
      tls: []

  connect:
    enabled: true
    replicas: 1
    image:
      repository: "quay.io/webrix/mcp-s-connect"
      tag: "latest"
    
    service:
      port: 80
      targetPort: 3000
    
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 1000m
        memory: 2048Mi
    
    nodeSelector: {}
    tolerations: []
    affinity: {}
    
    podAnnotations: {}
    podLabels: {}
    
    serviceAccount:
      create: true
      annotations: {}
      name: ""
    
    env:
      PORT: "3000"
      DEBUG: "true"
      AUTH_TRUST_HOST: "true"
      DB_AUTH_SECRET: "ZI39UlR2sN6HFZauuze0iNEZnNkF1wiOuGklm3bC8dk="
      AUTH_SECRET: "ZI39UlR2sN6HFZauuze0iNEZnNkF1wiOuGklm3bC8dk="

    # Health check probes
    readinessProbe: {}
    livenessProbe: {}
    
    ingress:
      enabled: true
      className: "nginx"
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
      subdomain: "webrix-connect"
      path: "/"
      pathType: "Prefix"
      tls: []

  run:
    enabled: true
    replicas: 1
    image:
      repository: "quay.io/webrix/mcp-s-run"
      tag: "latest"
    
    service:
      port: 80
      targetPort: 3000
    
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 1000m
        memory: 2048Mi
    
    nodeSelector: {}
    tolerations: []
    affinity: {}
    
    podAnnotations: {}
    podLabels: {}
    
    serviceAccount:
      create: true
      annotations: {}
      name: ""
    
    env:
      PORT: "3000"
      LOG_LEVEL: "info"
      AUTH_SECRET: "ZI39UlR2sN6HFZauuze0iNEZnNkF1wiOuGklm3bC8dk="


    # Health check probes
    readinessProbe: {}
    livenessProbe: {}
    
    ingress:
      enabled: true
      className: "nginx"
      annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
      subdomain: "webrix-run"
      path: "/"
      pathType: "Prefix"
      tls: []

  dbService:
    enabled: true
    replicas: 1
    image:
      repository: "quay.io/webrix/mcp-s-db-service"
      tag: "latest"
    
    # Database configuration for dbService
    db:
      user: "postgres"
      password: "postgres"
      port: 5432
      name: "postgres"
    
    service:
      port: 80
      targetPort: 3000
    
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 1000m
        memory: 2048Mi
    
    nodeSelector: {}
    tolerations: []
    affinity: {}
    
    podAnnotations: {}
    podLabels: {}
    
    serviceAccount:
      create: true
      annotations: {}
      name: ""
    
    env:
      PORT: "3000"
      DEBUG_QUERIES: "true"
      POSTGRES_HOST_AUTH_METHOD: "trust"
      RATE_LIMIT_MAX: "1000"
      RATE_LIMIT_WINDOW: "60000"
      # DATABASE_URL: "postgres://postgres:postgres@webrix-postgresql:5432/postgres?sslmode=disable"
      AUTH_SECRET: "ZI39UlR2sN6HFZauuze0iNEZnNkF1wiOuGklm3bC8dk="
      AUTO_AUTHENTICATE_TOKEN: "balQgAqCpKW979XoibTYSbfCjvj7uSJK+90m0iQG5"
      ENCRYPTION_KEY: "iL7wUJhqRMPFY0asXqLAn1JjW9kv0OqC4NHtqKHt5VY="

    # Health check probes
    readinessProbe:
      httpGet:
        path: /readyz
        port: 3000
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 10
    livenessProbe:
      httpGet:
        path: /healthz
        port: 3000
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    
    ingress:
      enabled: false

# PostgreSQL configuration
postgresql:
  enabled: false
  global:
    security:
      allowInsecureImages: true
  fullnameOverride: "webrix-postgresql"
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: "17.6.0"
  auth:
    enablePostgresUser: true
    postgresPassword: "postgres"
  
  primary:
    resourcesPreset: "small"
    persistence:
      enabled: true
      size: 8Gi
      storageClass: ""
  
  readReplicas:
    replicaCount: 0
  
  service:
    ports:
      postgresql: 5432
  
  metrics:
    enabled: false
  
  architecture: standalone
  
  postgresqlConfiguration:
    listen_addresses: "'*'"
    max_connections: "200"

# External database configuration (when db_provider is "external")
externalDatabase:
  # Option 1: Provide a complete database URL
  url: ""
  
  # Option 2: Provide individual components (used if url is empty)
  host: ""
  port: 5432
  database: "postgres"
  username: "postgres"
  password: ""
  sslMode: "disable"
