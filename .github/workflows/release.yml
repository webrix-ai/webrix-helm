name: Release Helm Chart

on:
  push:
    branches:
      - main
      - first-branch-refactoring
    paths:
      - 'Chart.yaml'
      - 'values.yaml'
      - 'templates/**'
  workflow_dispatch:
    inputs:
      auto_bump:
        description: 'Auto-bump patch version if exists'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Check and bump chart version
        id: version_check
        run: |
          chart_name=$(grep '^name:' Chart.yaml | awk '{print $2}')
          current_version=$(grep '^version:' Chart.yaml | awk '{print $2}')
          
          echo "Checking $chart_name version $current_version"
          
          # Check if this version already exists as a release
          if gh release view "v$current_version" &>/dev/null; then
            echo "⚠️  Version $current_version of $chart_name already exists"
            
            if [ "${{ github.event.inputs.auto_bump }}" == "true" ] || [ "${{ github.event_name }}" == "push" ]; then
              # Auto-bump patch version
              IFS='.' read -r major minor patch <<< "$current_version"
              new_version="$major.$minor.$((patch + 1))"
              
              echo "🔄 Auto-bumping to $new_version"
              sed -i "s/^version: .*/version: $new_version/" Chart.yaml
              
              git add Chart.yaml
              git commit -m "chore: bump $chart_name to $new_version [skip ci]"
              git push
              
              # Re-read the updated version
              current_version=$(grep '^version:' Chart.yaml | awk '{print $2}')
              echo "Updated to version: $current_version"
            else
              echo "❌ Please bump the version in Chart.yaml"
              exit 1
            fi
          else
            echo "✅ Version $current_version is new, proceeding with release"
          fi
          
          # Export for later steps
          echo "chart_name=$chart_name" >> $GITHUB_OUTPUT
          echo "version=$current_version" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm chart
        run: |
          helm package .
          
      - name: Create GitHub release
        run: |
          chart_name="${{ steps.version_check.outputs.chart_name }}"
          version="${{ steps.version_check.outputs.version }}"
          
          # Create release and upload chart package
          gh release create "v$version" \
            "$chart_name-$version.tgz" \
            --title "$chart_name $version" \
            --notes "Release of $chart_name version $version"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update Helm repo index
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          
          # Clone the repo to a temp directory for gh-pages work
          temp_dir=$(mktemp -d)
          repo_url="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          
          echo "📦 Cloning gh-pages branch..."
          if git clone --single-branch --branch gh-pages "$repo_url" "$temp_dir" 2>/dev/null; then
            echo "✅ gh-pages branch found"
          else
            echo "⚙️  Creating gh-pages branch from scratch"
            git clone "$repo_url" "$temp_dir"
            cd "$temp_dir"
            git checkout --orphan gh-pages
            rm -rf ./*
            echo "# Helm Charts Repository" > README.md
            git add README.md
            git commit -m "Initialize gh-pages branch"
            git push origin gh-pages
            cd -
          fi
          
          cd "$temp_dir"
          
          # Clean out old structure
          echo "🧹 Cleaning old files..."
          find . -maxdepth 1 -type f ! -name 'README.md' ! -name '.git*' -delete
          rm -rf v* charts
          
          # List all available releases
          echo "📋 All available releases:"
          gh release list --limit 100
          
          echo ""
          echo "📥 Downloading all chart releases..."
          gh release list --limit 100 | while read -r line; do
            tag=$(echo "$line" | awk '{print $1}')
            if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Processing $tag..."
              mkdir -p "$tag"
              echo "  Downloading to $tag/..."
              gh release download "$tag" -D "$tag" --pattern "*.tgz" --clobber 2>&1 || echo "⚠️ Failed to download $tag"
              
              # Verify what was downloaded
              if ls "$tag"/*.tgz 1> /dev/null 2>&1; then
                echo "  ✅ Downloaded: $(ls $tag/*.tgz)"
              else
                echo "  ❌ No files downloaded for $tag"
              fi
            fi
          done
          
          echo ""
          echo "📋 Final directory structure:"
          find . -name "*.tgz" -type f | sort
          
          echo ""
          echo "🧭 Generating index.yaml..."
          helm repo index . --url "https://github.com/${{ github.repository }}/releases/download"
          
          echo ""
          echo "📄 All URLs in generated index.yaml:"
          grep -o 'https://github.com[^"]*\.tgz' index.yaml | sort
          
          echo ""
          echo "📤 Committing and pushing to gh-pages..."
          git add -A
          git status
          git commit -m "Update Helm repo index for v${{ steps.version_check.outputs.version }}" || echo "No changes to commit"
          git push origin gh-pages
          
          echo ""
          echo "✅ Done! Index updated with all releases"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
