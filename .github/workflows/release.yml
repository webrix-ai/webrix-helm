name: Release Helm Chart

on:
  push:
    branches:
      - main
      - first-branch-refactoring
    paths:
      - 'Chart.yaml'
      - 'values.yaml'
      - 'templates/**'
  workflow_dispatch:
    inputs:
      auto_bump:
        description: 'Auto-bump patch version if exists'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Check and bump chart version
        id: version_check
        run: |
          chart_name=$(grep '^name:' Chart.yaml | awk '{print $2}')
          current_version=$(grep '^version:' Chart.yaml | awk '{print $2}')
          
          echo "Checking $chart_name version $current_version"
          
          # Check if this version already exists as a release
          if gh release view "v$current_version" &>/dev/null; then
            echo "⚠️  Version $current_version of $chart_name already exists"
            
            if [ "${{ github.event.inputs.auto_bump }}" == "true" ] || [ "${{ github.event_name }}" == "push" ]; then
              # Auto-bump patch version
              IFS='.' read -r major minor patch <<< "$current_version"
              new_version="$major.$minor.$((patch + 1))"
              
              echo "🔄 Auto-bumping to $new_version"
              sed -i "s/^version: .*/version: $new_version/" Chart.yaml
              
              git add Chart.yaml
              git commit -m "chore: bump $chart_name to $new_version [skip ci]"
              git push
              
              # Re-read the updated version
              current_version=$(grep '^version:' Chart.yaml | awk '{print $2}')
              echo "Updated to version: $current_version"
            else
              echo "❌ Please bump the version in Chart.yaml"
              exit 1
            fi
          else
            echo "✅ Version $current_version is new, proceeding with release"
          fi
          
          # Export for later steps
          echo "chart_name=$chart_name" >> $GITHUB_OUTPUT
          echo "version=$current_version" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

