{{- range $serviceName, $serviceConfig := .Values.deployments }}
{{- if $serviceConfig.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $serviceName | lower }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "webrix.labels" $ | nindent 4 }}
spec:
  type: {{ $serviceConfig.service.type | default "ClusterIP" }}
  ports:
    - port: {{ $serviceConfig.service.port | default 80 }}
      targetPort: {{ $serviceConfig.service.targetPort | default 3000 }}
      protocol: TCP
  selector:
    {{- include "webrix.serviceSelectorLabels" (dict "serviceName" $serviceName "root" $) | nindent 4 }}
{{- end }}
{{- end }}
